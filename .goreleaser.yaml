version: 2

project_name: blit

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/blit
    binary: blit
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: blitui
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/blitui/blit"
    description: "CLI for blit — the pragmatic Go TUI toolkit"
    license: "MIT"
    test: |
      system "#{bin}/blit", "-h"

scoops:
  - repository:
      owner: blitui
      name: scoop-bucket
    homepage: "https://github.com/blitui/blit"
    description: "CLI for blit — the pragmatic Go TUI toolkit"
    license: "MIT"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: blitui
    name: blit
  draft: false
  prerelease: auto
  name_template: "{{.Tag}}"
  header: |
    ## blit {{.Tag}}

    CLI for blit-powered Go TUI applications.

    ### Install

    ```bash
    # Homebrew
    brew install blitui/tap/blit

    # Scoop
    scoop bucket add blitui https://github.com/blitui/scoop-bucket
    scoop install blit

    # Go
    go install github.com/blitui/blit/cmd/blit@{{.Tag}}
    ```

    Or download a prebuilt archive from the assets below.
