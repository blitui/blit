version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gocritic
    - ineffassign
    - gosimple
    - misspell
  disable:
    - depguard
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: examples/
        linters:
          - errcheck
