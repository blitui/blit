version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gocritic
    - ineffassign
    - misspell
    - gosec
    - gocyclo
    - revive
    - errname
    - nilerr
  disable:
    - depguard
  settings:
    gocyclo:
      min-complexity: 25
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: examples/
        linters:
          - errcheck
