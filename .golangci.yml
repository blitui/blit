version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gocritic
    - ineffassign
    - misspell
    - gocyclo
    - dupl
    - errname
    # TODO: enable incrementally after fixing pre-existing issues
    # - gosec    # 29 issues (test false positives, integer overflow in conversions)
    # - revive   # 50 issues (unused params in tests, naming conventions)
    # - nilerr   # 16 issues (nil error returns)
  disable:
    - depguard
  settings:
    gocyclo:
      min-complexity: 30
    dupl:
      threshold: 120
  exclusions:
    rules:
      - path: '_test\.go'
        linters:
          - errcheck
          - dupl
      - path: 'updatetest/'
        linters:
          - errcheck
          - dupl
      - path: 'examples/'
        linters:
          - errcheck

issues:
  max-issues-per-linter: 50
  max-same-issues: 3
